<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	%sveltekit.head%

	<!--Fontawesome changing how we access stuff is so stupid... 
	ToDo: Figure out self hosting font awesome icons in the future-->
	<script src="https://kit.fontawesome.com/b779ca7d22.js" crossorigin="anonymous"></script>

	<script type="module">
		const theme = localStorage.getItem('color-scheme')

		theme
			? document.documentElement.setAttribute('color-scheme', theme)
			: localStorage.setItem('color-scheme', 'dark')
	</script>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
